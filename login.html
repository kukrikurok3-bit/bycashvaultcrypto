<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | ByCash Vault</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body style="background: radial-gradient(circle at center, #181a20 0%, #0b0e11 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="card animate-fade-in" style="width: 100%; max-width: 440px; padding: 40px;">
        <div style="text-align: center; margin-bottom: 32px;">
            <a href="/" class="nav-logo" style="justify-content: center; margin-bottom: 24px;">
                <div class="logo-icon">B</div>
                ByCash Vault
            </a>
            <h2 style="font-size: 28px; font-weight: 700; letter-spacing: -1px;">Welcome back</h2>
            <p class="text-muted" style="margin-top: 8px;">Enter your credentials to access your account</p>
        </div>

        <form id="login-form" class="flex flex-col gap-6">
            <div class="flex flex-col gap-2">
                <label class="text-muted" style="font-size: 13px; font-weight: 600;">Email Address</label>
                <input type="email" id="email" required class="input-field" placeholder="name@example.com">
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-muted" style="font-size: 13px; font-weight: 600;">Password</label>
                <input type="password" id="password" required class="input-field" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="padding: 14px; font-size: 16px;">Sign In</button>
        </form>

        <div style="margin-top: 32px; text-align: center; font-size: 14px;">
            <span class="text-muted">Don't have an account?</span>
            <a href="/register.html" class="text-accent" style="text-decoration: none; font-weight: 600; margin-left: 4px;">Create one</a>
        </div>
    </div>

    <script src="/js/translations.js"></script>
    <script>
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (res.ok) {
                const data = await res.json();
                window.location.href = data.role === 'admin' ? '/admin.html' : '/dashboard.html';
            } else {
                const err = await res.json();
                alert(err.error);
            }
        };
    </script>
</body>
</html>
