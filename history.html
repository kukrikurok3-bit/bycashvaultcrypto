<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History | ByCash Vault</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="flex items-center gap-8">
            <a href="/" class="nav-logo">
                <div class="logo-icon">B</div>
                ByCash Vault
            </a>
            <div class="nav-links">
                <a href="/dashboard.html" class="nav-link" data-i18n="dashboard">Dashboard</a>
                <a href="/trading.html" class="nav-link" data-i18n="trade">Trade</a>
                <a href="/settings.html" class="nav-link" data-i18n="settings">Settings</a>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <span class="text-muted" style="font-size: 12px;" data-i18n="balance">Balance:</span>
                    <span id="nav-balance" style="font-weight: 700; color: var(--success);">0.00 USDT</span>
                </div>
                <select id="lang-select" style="background: transparent; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; outline: none;">
                    <option value="en">EN</option>
                    <option value="ru">RU</option>
                    <option value="de">DE</option>
                    <option value="es">ES</option>
                    <option value="pt">PT</option>
                </select>
                <div id="theme-toggle" style="width: 40px; height: 20px; background: var(--bg-card); border-radius: 10px; position: relative; cursor: pointer; border: 1px solid var(--border);">
                    <div id="theme-circle" style="width: 14px; height: 14px; background: var(--accent); border-radius: 50%; position: absolute; right: 2px; top: 2px; transition: all 0.2s;"></div>
                </div>
                <button id="logout-btn" class="btn btn-ghost" data-i18n="logout">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container" style="padding: 40px 0;">
        <div class="animate-fade-in">
            <h2 style="font-size: 32px; font-weight: 800; margin-bottom: 40px;">Transaction History</h2>

            <div class="card">
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                        <thead>
                            <tr style="text-align: left; border-bottom: 1px solid var(--border); color: var(--text-muted);">
                                <th style="padding: 16px;">Date</th>
                                <th style="padding: 16px;">Type</th>
                                <th style="padding: 16px;">Asset</th>
                                <th style="padding: 16px;">Amount</th>
                                <th style="padding: 16px;">Status</th>
                            </tr>
                        </thead>
                        <tbody id="history-list">
                            <!-- History injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/translations.js"></script>
    <script>
        async function loadHistory() {
            const res = await fetch('/api/user/transactions');
            const transactions = await res.json();
            const list = document.getElementById('history-list');
            
            if (transactions.length === 0) {
                list.innerHTML = '<tr><td colspan="5" style="padding: 40px; text-align: center; color: var(--text-muted);">No transactions found</td></tr>';
                return;
            }

            list.innerHTML = transactions.map(t => `
                <tr style="border-bottom: 1px solid var(--border);">
                    <td style="padding: 16px;">${new Date(t.created_at).toLocaleString()}</td>
                    <td style="padding: 16px; text-transform: capitalize;">${t.type}</td>
                    <td style="padding: 16px;">${t.coin}</td>
                    <td style="padding: 16px;">${t.amount}</td>
                    <td style="padding: 16px;">
                        <span style="padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; background: ${t.status === 'approved' ? 'rgba(14, 203, 129, 0.1)' : 'rgba(240, 185, 11, 0.1)'}; color: ${t.status === 'approved' ? 'var(--success)' : 'var(--amber)'};">
                            ${t.status.charAt(0).toUpperCase() + t.status.slice(1)}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        async function loadUser() {
            const res = await fetch('/api/user');
            if (!res.ok) return window.location.href = '/login.html';
            const user = await res.json();
            document.getElementById('nav-balance').textContent = `${user.balance.toFixed(2)} USDT`;
        }

        document.getElementById('logout-btn').onclick = async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login.html';
        };

        loadHistory();
        loadUser();
    </script>
</body>
</html>
