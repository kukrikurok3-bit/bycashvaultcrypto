<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade | ByCash Vault</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body style="overflow: hidden;">
    <nav class="navbar">
        <div class="flex items-center gap-8">
            <a href="/" class="nav-logo">
                <div class="logo-icon">B</div>
                ByCash Vault
            </a>
            <div class="nav-links">
                <a href="/dashboard.html" class="nav-link" data-i18n="dashboard">Dashboard</a>
                <a href="/trading.html" class="nav-link active" data-i18n="trade">Trade</a>
                <a href="/settings.html" class="nav-link" data-i18n="settings">Settings</a>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <span class="text-muted" style="font-size: 12px;" data-i18n="balance">Balance:</span>
                    <span id="nav-balance" style="font-weight: 700; color: var(--success);">0.00 USDT</span>
                </div>
                <select id="lang-select" style="background: transparent; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; outline: none;">
                    <option value="en">EN</option>
                    <option value="ru">RU</option>
                    <option value="de">DE</option>
                    <option value="es">ES</option>
                    <option value="pt">PT</option>
                </select>
                <div id="theme-toggle" style="width: 40px; height: 20px; background: var(--bg-card); border-radius: 10px; position: relative; cursor: pointer; border: 1px solid var(--border);">
                    <div id="theme-circle" style="width: 14px; height: 14px; background: var(--accent); border-radius: 50%; position: absolute; right: 2px; top: 2px; transition: all 0.2s;"></div>
                </div>
                <button id="logout-btn" class="btn btn-ghost" data-i18n="logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="trading-container">
        <!-- Market List -->
        <aside class="trading-sidebar">
            <div class="trading-panel-header">Markets</div>
            <div style="padding: 12px;">
                <input type="text" class="input-field" placeholder="Search..." style="padding: 8px 12px; font-size: 12px;">
            </div>
            <div id="market-list" style="overflow-y: auto; flex: 1;">
                <!-- Pairs injected here -->
            </div>
        </aside>

        <!-- Chart & Info -->
        <main class="trading-main">
            <div class="flex items-center justify-between" style="padding: 16px 24px; border-bottom: 1px solid var(--border);">
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-3">
                        <img id="asset-icon" src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" width="32" alt="BTC" referrerPolicy="no-referrer">
                        <div style="font-size: 20px; font-weight: 800;" id="current-pair">BTC/USDT</div>
                    </div>
                    <div class="flex flex-col">
                        <span id="current-price" style="font-size: 18px; font-weight: 700; color: var(--success);">$71,744.97</span>
                        <span class="text-muted" style="font-size: 11px;">≈ $71,744.97</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-muted" style="font-size: 11px;">24h Change</span>
                        <span class="text-success" style="font-size: 13px; font-weight: 600;">+1.36%</span>
                    </div>
                </div>
            </div>
            <div style="flex: 1; background: var(--bg-main);">
                <!-- TradingView Widget -->
                <div id="tradingview_widget" style="height: 100%;"></div>
            </div>
        </main>

        <!-- Order Panel -->
        <aside class="trading-right">
            <div class="trading-panel-header">Place Order</div>
            <div style="padding: 20px; display: flex; flex-direction: column; gap: 20px;">
                <div class="flex gap-2" style="background: var(--bg-main); padding: 4px; border-radius: 8px;">
                    <button class="btn btn-primary" style="flex: 1; font-size: 12px; padding: 8px;">Buy</button>
                    <button class="btn btn-ghost" style="flex: 1; font-size: 12px; padding: 8px;">Sell</button>
                </div>
                
                <div class="flex flex-col gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-muted" style="font-size: 11px; font-weight: 700; text-transform: uppercase;">Price</label>
                        <div style="position: relative;">
                            <input type="number" class="input-field" value="71744.97" style="padding-right: 60px;">
                            <span style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--text-muted);">USDT</span>
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-muted" style="font-size: 11px; font-weight: 700; text-transform: uppercase;">Amount</label>
                        <div style="position: relative;">
                            <input type="number" class="input-field" placeholder="0.00" style="padding-right: 60px;">
                            <span style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--text-muted);">BTC</span>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <div class="flex justify-between" style="font-size: 12px;">
                        <span class="text-muted">Available</span>
                        <span id="available-usdt">0.00 USDT</span>
                    </div>
                    <button class="btn btn-primary" style="width: 100%; padding: 14px; background: var(--success); border: none;">Buy BTC</button>
                </div>
            </div>

            <div style="border-top: 1px solid var(--border); flex: 1;">
                <div class="trading-panel-header">Order Book</div>
                <div style="padding: 12px; font-size: 12px;">
                    <div class="flex justify-between text-muted" style="margin-bottom: 8px;">
                        <span>Price(USDT)</span>
                        <span>Amount(BTC)</span>
                    </div>
                    <div class="flex flex-col gap-1">
                        <div class="flex justify-between text-danger"><span>71745.50</span><span>0.124</span></div>
                        <div class="flex justify-between text-danger"><span>71745.10</span><span>1.500</span></div>
                        <div class="flex justify-between text-danger"><span>71744.90</span><span>0.045</span></div>
                        <div style="margin: 8px 0; font-size: 16px; font-weight: 800; text-align: center;" class="text-success">71744.97</div>
                        <div class="flex justify-between text-success"><span>71744.50</span><span>0.890</span></div>
                        <div class="flex justify-between text-success"><span>71744.10</span><span>2.112</span></div>
                        <div class="flex justify-between text-success"><span>71743.90</span><span>0.005</span></div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="/js/translations.js"></script>
    <script>
        const pairs = [
            { symbol: 'BTC/USDT', price: '71744.97', change: '+1.36%', icon: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png' },
            { symbol: 'ETH/USDT', price: '3591.92', change: '+1.48%', icon: 'https://cryptologos.cc/logos/ethereum-eth-logo.png' },
            { symbol: 'SOL/USDT', price: '174.22', change: '-0.84%', icon: 'https://cryptologos.cc/logos/solana-sol-logo.png' },
            { symbol: 'BNB/USDT', price: '584.10', change: '+0.12%', icon: 'https://cryptologos.cc/logos/bnb-bnb-logo.png' },
            { symbol: 'XRP/USDT', price: '0.6124', change: '-1.15%', icon: 'https://cryptologos.cc/logos/xrp-xrp-logo.png' },
            { symbol: 'ADA/USDT', price: '0.5844', change: '+0.45%', icon: 'https://cryptologos.cc/logos/cardano-ada-logo.png' },
            { symbol: 'DOGE/USDT', price: '0.1844', change: '+5.12%', icon: 'https://cryptologos.cc/logos/dogecoin-doge-logo.png' }
        ];

        function loadMarketList() {
            const list = document.getElementById('market-list');
            list.innerHTML = pairs.map(p => `
                <div class="flex items-center justify-between p-4 cursor-pointer hover:bg-secondary transition-all" onclick="selectPair('${p.symbol}', '${p.icon}')">
                    <div class="flex items-center gap-3">
                        <img src="${p.icon}" width="20" alt="${p.symbol}" referrerPolicy="no-referrer">
                        <span style="font-size: 13px; font-weight: 600;">${p.symbol}</span>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 13px; font-weight: 600;">${p.price}</div>
                        <div class="${p.change.startsWith('+') ? 'text-success' : 'text-danger'}" style="font-size: 11px;">${p.change}</div>
                    </div>
                </div>
            `).join('');
        }

        function selectPair(symbol, icon) {
            document.getElementById('current-pair').textContent = symbol;
            document.getElementById('asset-icon').src = icon;
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:" + symbol.replace('/', ''),
                "interval": "D",
                "timezone": "Etc/UTC",
                "theme": document.documentElement.getAttribute('data-theme') || "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "allow_symbol_change": true,
                "container_id": "tradingview_widget"
            });
        }

        async function loadUser() {
            const res = await fetch('/api/user');
            if (res.ok) {
                const user = await res.json();
                document.getElementById('nav-balance').textContent = `${user.balance.toFixed(2)} USDT`;
                document.getElementById('available-usdt').textContent = `${user.balance.toFixed(2)} USDT`;
            }
        }

        document.getElementById('logout-btn').onclick = async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login.html';
        };

        window.addEventListener('load', () => {
            loadMarketList();
            selectPair('BTC/USDT', 'https://cryptologos.cc/logos/bitcoin-btc-logo.png');
            loadUser();
        });
    </script>
</body>
</html>
