<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet | ByCash Vault</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="flex items-center gap-8">
            <a href="/" class="nav-logo">
                <div class="logo-icon">B</div>
                ByCash Vault
            </a>
            <div class="nav-links">
                <a href="/dashboard.html" class="nav-link">Dashboard</a>
                <a href="/trading.html" class="nav-link">Trade</a>
                <a href="/wallet.html" class="nav-link active">Wallet</a>
                <a href="/referral.html" class="nav-link">Referral</a>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-4">
                <span id="user-email" class="text-muted" style="font-size: 13px;"></span>
                <button id="logout-btn" class="btn btn-ghost">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container" style="padding: 40px 0;">
        <div class="animate-fade-in">
            <div class="flex justify-between items-end" style="margin-bottom: 40px;">
                <div>
                    <h2 style="font-size: 32px; font-weight: 800; letter-spacing: -1px;">Wallet</h2>
                    <p class="text-muted">Manage your assets and view transaction history.</p>
                </div>
                <div class="flex gap-4">
                    <a href="/deposit.html" class="btn btn-primary">Deposit</a>
                    <a href="/withdraw.html" class="btn btn-outline">Withdraw</a>
                </div>
            </div>

            <div class="card" style="padding: 0; overflow: hidden;">
                <div style="padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="font-size: 18px; font-weight: 700;">Assets</h3>
                    <div class="flex gap-4">
                        <div class="flex items-center gap-2" style="font-size: 13px; color: var(--text-muted);">
                            <input type="checkbox" id="hide-zero">
                            <label for="hide-zero">Hide 0 balances</label>
                        </div>
                    </div>
                </div>
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--border); color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">
                                <th style="padding: 16px 24px;">Asset</th>
                                <th style="padding: 16px 24px;">Total Balance</th>
                                <th style="padding: 16px 24px;">Available</th>
                                <th style="padding: 16px 24px;">In Order</th>
                                <th style="padding: 16px 24px; text-align: right;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="assets-list">
                            <!-- Assets injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const assets = [
            { name: 'Bitcoin', symbol: 'BTC', color: '#f7931a' },
            { name: 'Ethereum', symbol: 'ETH', color: '#627eea' },
            { name: 'Tether', symbol: 'USDT', color: '#26a17b' },
            { name: 'BNB', symbol: 'BNB', color: '#f3ba2f' },
            { name: 'Solana', symbol: 'SOL', color: '#14f195' },
            { name: 'XRP', symbol: 'XRP', color: '#23292f' },
            { name: 'Dogecoin', symbol: 'DOGE', color: '#c2a633' }
        ];

        async function loadWallet() {
            const res = await fetch('/api/user');
            if (!res.ok) return window.location.href = '/login.html';
            
            const user = await res.json();
            document.getElementById('user-email').textContent = user.email;

            const list = document.getElementById('assets-list');
            list.innerHTML = assets.map(a => `
                <tr style="border-bottom: 1px solid var(--border); font-size: 14px;">
                    <td style="padding: 20px 24px;">
                        <div class="flex items-center gap-3">
                            <div style="width: 32px; height: 32px; background: ${a.color}; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: white;">${a.symbol[0]}</div>
                            <div>
                                <div style="font-weight: 700;">${a.name}</div>
                                <div class="text-muted" style="font-size: 12px;">${a.symbol}</div>
                            </div>
                        </div>
                    </td>
                    <td style="padding: 20px 24px;">
                        <div style="font-weight: 700;">${a.symbol === 'USDT' ? user.balance.toFixed(2) : '0.00000000'}</div>
                        <div class="text-muted" style="font-size: 12px;">≈ $${a.symbol === 'USDT' ? user.balance.toFixed(2) : '0.00'}</div>
                    </td>
                    <td style="padding: 20px 24px;">${a.symbol === 'USDT' ? user.balance.toFixed(2) : '0.00000000'}</td>
                    <td style="padding: 20px 24px;">0.00000000</td>
                    <td style="padding: 20px 24px; text-align: right;">
                        <a href="/deposit.html?coin=${a.symbol}" class="text-accent" style="text-decoration: none; font-weight: 600; margin-right: 16px;">Deposit</a>
                        <a href="/withdraw.html?coin=${a.symbol}" class="text-accent" style="text-decoration: none; font-weight: 600; margin-right: 16px;">Withdraw</a>
                        <a href="/trading.html?symbol=${a.symbol}USDT" class="text-accent" style="text-decoration: none; font-weight: 600;">Trade</a>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('logout-btn').onclick = async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login.html';
        };

        loadWallet();
    </script>
</body>
</html>
