<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | ByCashVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-[#0b0e11] text-[#eaecef] flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="/" class="text-3xl font-bold tracking-tight inline-flex items-center gap-2 mb-4 text-[#f0b90b]">
                <svg width="40" height="40" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 0L32 16L16 32L0 16L16 0Z" fill="#f0b90b"/>
                </svg>
                ByCashVault
            </a>
            <h2 class="text-2xl font-bold">Log In</h2>
        </div>

        <form id="login-form" class="card space-y-6">
            <div>
                <label class="block text-sm font-medium text-[#848e9c] mb-2">Email</label>
                <input type="email" id="email" required class="input-field" placeholder="Email">
            </div>
            <div>
                <label class="block text-sm font-medium text-[#848e9c] mb-2">Password</label>
                <input type="password" id="password" required class="input-field" placeholder="Password">
            </div>

            <button type="submit" class="w-full btn-primary py-3">Log In</button>
            
            <p class="text-center text-sm text-[#848e9c]">
                Don't have an account? <a href="/register.html" class="text-[#f0b90b] hover:underline">Register</a>
            </p>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();
            if (res.ok) {
                if (email === 'admin') {
                    window.location.href = '/admin.html';
                } else {
                    window.location.href = '/dashboard.html';
                }
            } else {
                alert(data.error);
            }
        });
    </script>
</body>
</html>
