<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | ByCashVault</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="flex items-center gap-4">
            <div style="width: 32px; height: 32px; background: var(--accent); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: black; font-weight: 800;">A</div>
            <h1 style="font-size: 18px; font-weight: 700;">Admin Control Center</h1>
        </div>
        <div class="flex items-center gap-6">
            <a href="/" class="text-muted" style="font-size: 12px; text-decoration: none;">View Site</a>
            <button id="logout-btn" class="text-muted" style="font-size: 12px; background: none; border: none; cursor: pointer;">Logout</button>
        </div>
    </nav>

    <main class="container animate-fade-in" style="padding: 40px 24px; max-width: 1400px;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 40px;">
            <div class="card" style="border-left: 4px solid var(--accent); padding: 24px;">
                <p class="text-muted" style="font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;">Total Users</p>
                <p id="total-users" style="font-size: 32px; font-weight: 700;">0</p>
            </div>
            <div class="card" style="border-left: 4px solid var(--success); padding: 24px;">
                <p class="text-muted" style="font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;">Pending Deposits</p>
                <p id="pending-deposits" style="font-size: 32px; font-weight: 700;">0</p>
            </div>
            <div class="card" style="border-left: 4px solid var(--danger); padding: 24px;">
                <p class="text-muted" style="font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;">Pending Withdrawals</p>
                <p id="pending-withdrawals" style="font-size: 32px; font-weight: 700;">0</p>
            </div>
            <div class="card" style="border-left: 4px solid #3b82f6; padding: 24px;">
                <p class="text-muted" style="font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;">KYC Requests</p>
                <p id="pending-kyc" style="font-size: 32px; font-weight: 700;">0</p>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 32px;">
            <!-- Users Table -->
            <div class="card" style="padding: 0; overflow: hidden;">
                <div style="padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="font-size: 18px; font-weight: 700;">User Management</h3>
                    <input type="text" placeholder="Search users..." class="input-field" style="width: 200px; padding: 8px 12px; font-size: 12px;">
                </div>
                <div style="overflow-x: auto;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Balance</th>
                                <th>KYC</th>
                                <th>Win Rate</th>
                                <th style="text-align: right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-list">
                            <!-- Users will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Transactions Table -->
            <div class="card" style="padding: 0; overflow: hidden;">
                <div style="padding: 24px; border-bottom: 1px solid var(--border);">
                    <h3 style="font-size: 18px; font-weight: 700;">Recent Transactions</h3>
                </div>
                <div style="overflow-x: auto;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th style="text-align: right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="transactions-list">
                            <!-- Transactions will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function loadData() {
            const usersRes = await fetch('/api/admin/users');
            const txRes = await fetch('/api/admin/transactions');
            
            if (!usersRes.ok || !txRes.ok) {
                window.location.href = '/login.html';
                return;
            }

            const users = await usersRes.json();
            const transactions = await txRes.json();

            document.getElementById('total-users').textContent = users.length;
            document.getElementById('pending-deposits').textContent = transactions.filter(t => t.type === 'deposit' && t.status === 'pending').length;
            document.getElementById('pending-withdrawals').textContent = transactions.filter(t => t.type === 'withdraw' && t.status === 'pending').length;
            document.getElementById('pending-kyc').textContent = users.filter(u => u.kyc_status === 'pending').length;

            const usersList = document.getElementById('users-list');
            usersList.innerHTML = users.map(u => `
                <tr>
                    <td style="font-weight: 700;">${u.email}</td>
                    <td>$${u.balance.toFixed(2)}</td>
                    <td>
                        <span style="padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; background: ${u.kyc_status === 'verified' ? 'rgba(14, 203, 129, 0.1)' : 'rgba(246, 70, 93, 0.1)'}; color: ${u.kyc_status === 'verified' ? 'var(--success)' : 'var(--danger)'};">
                            ${u.kyc_status}
                        </span>
                    </td>
                    <td>${u.win_rate}%</td>
                    <td style="text-align: right;">
                        <button onclick="updateBalance(${u.id})" style="background: none; border: none; color: var(--accent); cursor: pointer; font-size: 12px; margin-right: 8px;">Add $</button>
                        <button onclick="updateWinRate(${u.id})" style="background: none; border: none; color: #3b82f6; cursor: pointer; font-size: 12px; margin-right: 8px;">Rate</button>
                        ${u.kyc_status === 'pending' ? `<button onclick="approveKYC(${u.id})" style="background: none; border: none; color: var(--success); cursor: pointer; font-size: 12px;">Verify</button>` : ''}
                    </td>
                </tr>
            `).join('');

            const txList = document.getElementById('transactions-list');
            txList.innerHTML = transactions.map(t => `
                <tr>
                    <td>${t.email}</td>
                    <td style="text-transform: uppercase;">${t.type}</td>
                    <td>${t.amount} ${t.network.split(' ')[0]}</td>
                    <td>
                        <span style="padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; background: ${t.status === 'approved' ? 'rgba(14, 203, 129, 0.1)' : t.status === 'pending' ? 'rgba(240, 185, 11, 0.1)' : 'rgba(246, 70, 93, 0.1)'}; color: ${t.status === 'approved' ? 'var(--success)' : t.status === 'pending' ? 'var(--accent)' : 'var(--danger)'};">
                            ${t.status}
                        </span>
                    </td>
                    <td style="text-align: right;">
                        ${t.status === 'pending' ? `
                            <button onclick="handleTx(${t.id}, 'approved')" style="background: none; border: none; color: var(--success); cursor: pointer; font-size: 12px; margin-right: 8px;">Approve</button>
                            <button onclick="handleTx(${t.id}, 'rejected')" style="background: none; border: none; color: var(--danger); cursor: pointer; font-size: 12px;">Reject</button>
                        ` : '-'}
                    </td>
                </tr>
            `).join('');
        }

        async function updateBalance(userId) {
            const amount = prompt('Enter amount to add (negative for subtract):');
            if (amount === null) return;
            await fetch('/api/admin/update-balance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, amount: parseFloat(amount) })
            });
            loadData();
        }

        async function updateWinRate(userId) {
            const rate = prompt('Enter new win rate (0-100):');
            if (rate === null) return;
            await fetch('/api/admin/update-win-rate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, winRate: parseInt(rate) })
            });
            loadData();
        }

        async function handleTx(id, status) {
            await fetch('/api/admin/approve-transaction', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, status })
            });
            loadData();
        }

        async function approveKYC(userId) {
            await fetch('/api/admin/approve-kyc', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, status: 'verified' })
            });
            loadData();
        }

        document.getElementById('logout-btn').onclick = async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login.html';
        };

        loadData();
        setInterval(loadData, 10000);
    </script>
</body>
</html>
